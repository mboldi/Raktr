server:
  shutdown: graceful

spring:
  application:
    name: BSS-Raktr

  datasource:
    url: jdbc:postgresql://localhost:5432/raktrdb
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: UTC
    open-in-view: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://login.bsstudio.hu/application/o/raktr/jwks/
          issuer-uri: https://login.bsstudio.hu/application/o/raktr/

sentry:
  dsn: ""
  send-default-pii: true
  traces-sample-rate: 0.2
  exception-resolver-order: -2147483647

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info

springdoc:
  swagger-ui:
    oauth:
      client-id: 2wD6qaqGsYefuYv271cwjUYUDeL2HXJFhj2Omfbg
      use-pkce-with-authorization-code-grant: true
