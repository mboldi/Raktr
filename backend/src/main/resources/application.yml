spring:
  application:
    name: BSS-Raktr

  datasource:
    url: jdbc:postgresql://db:5432/raktrdb
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: UTC
    open-in-view: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://login.bsstudio.hu/application/o/raktr/
