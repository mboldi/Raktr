spring:
  application:
    name: BSS-Raktr

  datasource:
    url: jdbc:postgresql://db:5432/raktrdb
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: UTC
    open-in-view: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://login.bsstudio.hu/application/o/raktr/jwks/
          issuer-uri: https://login.bsstudio.hu/application/o/raktr/

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info

springdoc:
  swagger-ui:
    oauth:
      client-id: 2wD6qaqGsYefuYv271cwjUYUDeL2HXJFhj2Omfbg
      use-pkce-with-authorization-code-grant: true

rent:
  team-name: teamName
  team-leader-name: teamLeaderName
  first-signer-name: firstSignerName
  first-signer-title: firstSignerTitle
  second-signer-name: secondSignerName
  second-signer-title: secondSignerTitle
