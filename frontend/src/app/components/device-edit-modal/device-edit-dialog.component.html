<h2 mat-dialog-title>Eszköz hozzáadása</h2>

<mat-dialog-content class="mt-3">
  <form class="container-fluid">
    <div class="row" style="align-items: center">
      <div class="col-md-7 col-sm-12">
        <mat-form-field class="full-width">
          <mat-label>Eszköz neve</mat-label>
          <input matInput>
        </mat-form-field>
      </div>
      <div class="col-md-5 col-sm-12">
        <mat-checkbox class="full-width">
          Bárki által kölcsönözhető
        </mat-checkbox>
      </div>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="false">Vissza</button>
  <button mat-raised-button color="primary" [mat-dialog-close]="true">Mentés</button>
</mat-dialog-actions>
