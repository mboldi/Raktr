<h2 mat-dialog-title>Eszköz hozzáadása</h2>

<mat-dialog-content class="mt-3" style="max-height: 100vh">
  <app-device-form [deviceData]="deviceData" />
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="false">Vissza</button>
  <button mat-raised-button color="primary" (click)="save()">Mentés</button>
</mat-dialog-actions>
