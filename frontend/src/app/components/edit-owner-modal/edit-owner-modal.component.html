<h2 mat-dialog-title>{{ title }}</h2>

<mat-dialog-content class="mt-3" style="min-height: 120px">
  <form [formGroup]="ownerForm">

    <div class="col-sm-12">
      <mat-form-field class="full-width">
        <mat-label>Név</mat-label>
        <input matInput formControlName="name">
      </mat-form-field>
    </div>

    <div class="col-sm-12">
      <mat-checkbox class="full-width" formControlName="inSchInventory">
        Schönherz leltár része
      </mat-checkbox>
    </div>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="false">Vissza</button>
  <button mat-raised-button color="primary" (click)="save()">Mentés</button>
</mat-dialog-actions>
