<h2>Üdvözöllek a Raktrban!</h2>

<div style="display: flex; flex-wrap: wrap; gap: 8px">
  <mat-card class="card-with-icon col-xl-3 col-lg-5 col-md-10 col-sm-12">
    <mat-card-header style="padding-bottom: 16px">
      <mat-icon class="card-icon bg-blue">sd_storage</mat-icon>
      <h4 style="font-weight: lighter; margin-left: 16px; font-size: 1.3rem;">Keresés</h4>
    </mat-card-header>
    <mat-card-content>
      <mat-form-field class="deviceSearchField" style="width: 100%">
        <mat-label>Eszköz vonalkódja</mat-label>
        <input matInput autofocus type="text"
               autocomplete="off"
               (keyup.enter)="searchDevice()"
               [formControl]="deviceSearchFormControl">
        @if (deviceSearchFormControl.value) {
          <button mat-icon-button matSuffix
                  aria-label="Search"
                  (click)="searchDevice()">
            <mat-icon matSuffix>search</mat-icon>
          </button>
        }
      </mat-form-field>
    </mat-card-content>
  </mat-card>

  <mat-card class="card-with-icon overview-card col-xl-2 col-lg-5 col-md-5 col-sm-12">
    <mat-card-header>
      <mat-icon class="card-icon bg-green">content_paste</mat-icon>
      <h4>Aktív kivitelek</h4>
    </mat-card-header>
    <mat-card-content>
      <div>
        <p>0 <b>db</b></p>
        <button matFab
                aria-label="add-rent"
                (click)="addRent()">
          <mat-icon matSuffix>add</mat-icon>
        </button>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card class="card-with-icon overview-card col-xl-2 col-lg-5 col-md-5 col-sm-12">
    <mat-card-header>
      <mat-icon class="card-icon bg-orange">content_paste</mat-icon>
      <h4>Kezelt tételek</h4>
    </mat-card-header>
    <mat-card-content>
      <div>
        <p>0 <b>db</b></p>
        <button matFab
                aria-label="add-rent"
                (click)="addDevice()">
          <mat-icon matSuffix>add</mat-icon>
        </button>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card class="card-with-icon overview-card col-xl-2 col-lg-5 col-md-5 col-sm-12">
    <mat-card-header>
      <mat-icon class="card-icon bg-red">content_paste</mat-icon>
      <h4>Aktív hibajegyek</h4>
    </mat-card-header>
    <mat-card-content>
      <div>
        <p>0 <b>db</b></p>
        <button matFab
                aria-label="add-rent"
                (click)="addDevice()">
          <mat-icon matSuffix>add</mat-icon>
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</div>

<mat-card style="margin: 24px 16px 0 0">
  <mat-card-title style="padding: 16px 0 16px 16px">
    Aktív kivitelek
  </mat-card-title>
  <mat-card-content>
  </mat-card-content>
</mat-card>
